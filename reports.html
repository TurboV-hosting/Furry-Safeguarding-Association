
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSA Admin | Pending Reports</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-nav: #0f3460;
            --bg-card: #16213e;
            --accent: #e94560;
            --text: #e0e0e0;
            --priority-high: #ff4b2b;
            --priority-med: #ff9800;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        aside {
            width: 240px;
            background: var(--bg-nav);
            border-right: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100vh;
        }

        aside h2 {
            color: var(--accent);
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        aside nav a {
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 5px 0;
            border-radius: 5px;
            display: block;
            transition: background 0.3s;
        }

        aside nav a:hover, aside nav a.active {
            background: var(--accent);
        }

        /* Main Content */
        main {
            margin-left: 280px;
            padding: 40px;
            flex-grow: 1;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-top: 3px solid var(--accent);
        }

        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #888; }
        .stat-card p { font-size: 2rem; font-weight: bold; margin: 10px 0 0; }

        .admin-section {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }

        table th { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; }

        .priority-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .high { background: var(--priority-high); color: white; }
        .med { background: var(--priority-med); color: black; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <aside>
        <h2>FSA ADMIN</h2>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="reports.html" class="active">Pending Reports</a>
            <a href="#">The Blacklist</a>
            <a href="#">Team Management</a>
            <a href="#">Site Settings</a>
            <a href="/" style="margin-top: 50px; border: 1px solid var(--accent);">View Live Site</a>
        </nav>
    </aside>

    <main>
        <div class="header-bar">
            <h1>Pending Submissions</h1>
            <div>
                <span>Reviewing as <strong>Emma</strong></span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>AWAITING REVIEW</h3>
                <p id="count-pending">0</p>
            </div>
            <div class="stat-card">
                <h3>UNDER INVESTIGATION</h3>
                <p id="count-review">0</p>
            </div>
            <div class="stat-card">
                <h3>RESOLVED (24H)</h3>
                <p>12</p>
            </div>
        </div>

        <div class="admin-section">
            <h2>Active Report Queue</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Subject</th>
                        <th>Priority</th>
                        <th>Category</th>
                        <th>Reporter</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pending-reports-list">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #888;">Fetching live queue...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5OjSypVv3dNki_RhEK07odHqVwg_arrg",
            authDomain: "furry-872b4.firebaseapp.com",
            projectId: "furry-872b4",
            storageBucket: "furry-872b4.firebasestorage.app",
            messagingSenderId: "185088460549",
            appId: "1:185088460549:web:864af7c15cc21d2dd3996c",
            measurementId: "G-HC23XV9J99"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Update Stats Specific to Reports
        onSnapshot(query(collection(db, "reports"), where("status", "==", "Pending")), (snap) => {
            document.getElementById('count-pending').innerText = snap.size;
        });

        onSnapshot(query(collection(db, "reports"), where("status", "==", "Under Review")), (snap) => {
            document.getElementById('count-review').innerText = snap.size;
        });

        // Populate Table with only PENDING reports
        const reportsList = document.getElementById('pending-reports-list');
        const q = query(collection(db, "reports"), where("status", "==", "Pending"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                reportsList.innerHTML = `<tr><td colspan="6" style="text-align: center;">Queue is currently clear. Good work!</td></tr>`;
                return;
            }

            reportsList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : "N/A";
                const priorityClass = data.priority === 'High' ? 'high' : 'med';
                
                reportsList.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td><strong>${data.subjectName || 'Unknown'}</strong></td>
                        <td><span class="priority-tag ${priorityClass}">${data.priority || 'Low'}</span></td>
                        <td>${data.category || 'General'}</td>
                        <td>${data.reporterName || 'Anonymous'}</td>
                        <td>
                            <button class="btn" onclick="console.log('Opening ID: ${doc.id}')">Review Case</button>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
