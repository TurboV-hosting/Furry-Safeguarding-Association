<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSA Admin | Pending Reports</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-nav: #0f3460;
            --bg-card: #16213e;
            --accent: #e94560;
            --text: #e0e0e0;
            --priority-high: #ff4b2b;
            --priority-med: #ff9800;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        aside {
            width: 240px;
            background: var(--bg-nav);
            border-right: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: fixed;
            height: 100vh;
        }

        aside h2 {
            color: var(--accent);
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        aside nav a {
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 5px 0;
            border-radius: 5px;
            display: block;
            transition: background 0.3s;
        }

        aside nav a:hover, aside nav a.active { background: var(--accent); }

        main {
            margin-left: 280px;
            padding: 40px;
            flex-grow: 1;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .admin-section {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #333;
        }

        table th { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; }

        .priority-tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .high { background: var(--priority-high); color: white; }
        .med { background: var(--priority-med); color: black; }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Detail Modal Styling */
        #detail-view {
            display: none;
            border-left: 5px solid var(--accent);
            animation: fadeIn 0.3s ease-in;
        }

        .data-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #2a2a4a;
        }

        .data-label {
            width: 150px;
            color: var(--accent);
            font-weight: bold;
            text-transform: capitalize;
        }

        .data-value { flex: 1; word-break: break-all; }

        .evidence-img {
            max-width: 200px;
            border-radius: 5px;
            margin: 10px 10px 0 0;
            cursor: pointer;
            border: 1px solid #444;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <aside>
        <h2>FSA ADMIN</h2>
        <nav>
            <a href="admin.html">Dashboard</a>
            <a href="reports.html" class="active">Pending Reports</a>
            <a href="#">The Blacklist</a>
            <a href="#">Team Management</a>
            <a href="#">Site Settings</a>
            <a href="/" style="margin-top: 50px; border: 1px solid var(--accent);">View Live Site</a>
        </nav>
    </aside>

    <main>
        <div class="header-bar">
            <h1>Pending Submissions</h1>
            <span>Reviewing as <strong>Emma</strong></span>
        </div>

        <div id="detail-view" class="admin-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="detail-title">Report Details</h2>
                <button class="btn" onclick="document.getElementById('detail-view').style.display='none'">Close Detail</button>
            </div>
            <div id="detail-content">
                </div>
        </div>

        <div class="admin-section">
            <h2>Active Report Queue (Pending Collection)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Subject</th>
                        <th>Priority</th>
                        <th>Category</th>
                        <th>Reporter</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="pending-reports-list">
                    <tr><td colspan="6" style="text-align: center;">Connecting to pending collection...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5OjSypVv3dNki_RhEK07odHqVwg_arrg",
            authDomain: "furry-872b4.firebaseapp.com",
            projectId: "furry-872b4",
            storageBucket: "furry-872b4.firebasestorage.app",
            messagingSenderId: "185088460549",
            appId: "1:185088460549:web:864af7c15cc21d2dd3996c",
            measurementId: "G-HC23XV9J99"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global function to render details
        window.openReport = function(dataJson) {
            const data = JSON.parse(decodeURIComponent(dataJson));
            const container = document.getElementById('detail-content');
            const view = document.getElementById('detail-view');
            
            container.innerHTML = ""; // Clear
            document.getElementById('detail-title').innerText = `Report: ${data.subjectName || 'Unknown'}`;

            // Loop through every key in the document
            for (const [key, value] of Object.entries(data)) {
                let displayContent = "";

                if (key === 'evidencePhotos') {
                    // Check if value is an array or a single string link
                    if (Array.isArray(value)) {
                        displayContent = value.map(url => `<a href="${url}" target="_blank"><img src="${url}" class="evidence-img"></a>`).join('');
                    } else if (typeof value === 'string' && value.startsWith('http')) {
                        displayContent = `<a href="${value}" target="_blank"><img src="${value}" class="evidence-img"></a>`;
                    } else {
                        displayContent = value || "None provided";
                    }
                } else {
                    // Handle timestamps vs strings
                    displayContent = (value && typeof value === 'object' && value.seconds) 
                        ? new Date(value.seconds * 1000).toLocaleString() 
                        : (value || "N/A");
                }

                container.innerHTML += `
                    <div class="data-row">
                        <div class="data-label">${key}:</div>
                        <div class="data-value">${displayContent}</div>
                    </div>`;
            }

            view.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const reportsList = document.getElementById('pending-reports-list');
        
        // Removed orderBy("timestamp") so documents show up even if the field is missing
        const q = query(collection(db, "pending"));

        onSnapshot(q, (snapshot) => {
            if (snapshot.empty) {
                reportsList.innerHTML = `<tr><td colspan="6" style="text-align: center;">No documents in "pending" collection.</td></tr>`;
                return;
            }

            reportsList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : "No Date";
                const priorityClass = data.priority === 'High' ? 'high' : 'med';
                
                const dataString = encodeURIComponent(JSON.stringify(data));

                reportsList.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td><strong>${data.subjectName || 'Unknown'}</strong></td>
                        <td><span class="priority-tag ${priorityClass}">${data.priority || 'Low'}</span></td>
                        <td>${data.category || 'General'}</td>
                        <td>${data.reporterName || 'Anonymous'}</td>
                        <td>
                            <button class="btn" onclick="openReport('${dataString}')">Review Case</button>
                        </td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
